<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.14.1/jquery-ui.min.js"></script>
    <title>Random user Generator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://ajax.googleapis.com/ajax/libs/jqueryui/1.14.1/themes/smoothness/jquery-ui.css"
    />
    <script src="js/script.js"></script>
    <title></title>
  </head>
  <body>
    <div>
      <!-- Navigation -->
      <!-- TODO -->
      <div class="header py-2">
        <div
          class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start"
        >
          <a
            href="/"
            class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none"
          >
          </a>
          <ul
            class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0"
          >
            <li><a href="#" class="nav-link px-2 text-secondary">Home</a></li>
            <li>
              <a
                href="https://github.com/heeeeeeeeeeh/CS3342-midterm"
                target="_blank"
                class="nav-link px-2 text-white"
                >Github</a
              >
            </li>
          </ul>
          <form class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3" role="search">
            <input
              type="search"
              class="form-control form-control-dark text-bg-dark"
              placeholder="Search..."
              aria-label="Search"
            />
          </form>
          <div class="text-end">
            <button type="button" class="btn btn-outline-light me-2">
              Login
            </button>
            <button type="button" class="btn btn-warning">Sign-up</button>
          </div>
        </div>
      </div>
      <div>
        <h1>CSCI 3342 Midterm Exam</h1>
        <h2>Random User Generator</h2>
      </div>

      <!-- Main Content: Profile Card -->
      <div class="profile-container">
        <div class="profile">
          <div class="image">
            <img id="pic" src="./images/user.jpg" />
          </div>
          <div class="details">
            <p>Name: <span id="name">Full name</span></p>
            <p>
              Email:
              <span id="email">email@gmail.com</span>
            </p>
            <p>Location: <span id="address">Edinburg, TX</span></p>
            <p>Age: <span id="age">30</span></p>
            <p id="phone"></p>
          </div>
        </div>
      </div>

      <!-- Next Button -->
      <div class="next">
        <button
          id="next-btn"
          class="relative bg-black text-white px-4 py-2 rounded w-full my-4"
        >
          Next Profile
        </button>
      </div>
    </div>
  </body>
</html>
